name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test SSH connection
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY'
            import os
            from pathlib import Path
            key = os.environ.get('SSH_KEY', '')
            if '\\r' in key:
                key = key.replace('\\r', '')
            if '\\n' in key and '\n' not in key:
                key = key.replace('\\n', '\n')
            Path.home().joinpath('.ssh/deploy_key').write_text(key, newline='\n')
          PY
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          ls -l ~/.ssh/deploy_key ~/.ssh/deploy_key.pub
          ssh -i ~/.ssh/deploy_key -o PreferredAuthentications=publickey -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=no -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}"@"${{ secrets.SSH_HOST }}" 'echo SSH connection OK'

      - name: Deploy via rsync over SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 - <<'PY'
            import os
            from pathlib import Path
            key = os.environ.get('SSH_KEY', '')
            if '\\r' in key:
                key = key.replace('\\r', '')
            if '\\n' in key and '\n' not in key:
                key = key.replace('\\n', '\n')
            Path.home().joinpath('.ssh/deploy_key').write_text(key, newline='\n')
          PY
          chmod 600 ~/.ssh/deploy_key
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='README.md' \
            --exclude='.ftp-deploy-sync-state.json' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p '${{ secrets.SSH_PORT }}'" \
            ./ "/"
